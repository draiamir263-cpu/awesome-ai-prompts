<!DOCTYPE html>
<html>
<head>
  <title>Axios Example</title>
</head>
<body>
 <script src ="node_modules/axios/dist/axios.js"
  <script>
    import axios from 'axios';
    const axios = require('axios');

    axios.get('https://jsonplaceholder.typicode.com/posts')
      .then((response) => {
        console.log(response);
      })
      .catch((error) => {
        console.error(error);
      });
  </script>
</body>
</html>
